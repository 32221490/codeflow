spring.application.name=codeflow

# 테스트용 H2 인메모리 DB
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.h2.console.enabled=false

# JWT (테스트용 더미값)
jwt.secret=test-secret-key-for-testing-only-must-be-256-bits-long
jwt.access-expiration=3600000

# Redis (테스트에서 사용 안 함 — MockBean으로 대체)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Mail (테스트에서 사용 안 함 — MockBean으로 대체)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

# GitHub OAuth2 (테스트용 더미값)
spring.security.oauth2.client.registration.github.client-id=test-client-id
spring.security.oauth2.client.registration.github.client-secret=test-client-secret
spring.security.oauth2.client.registration.github.scope=user:email,read:user
spring.security.oauth2.client.registration.github.redirect-uri=http://localhost/login/oauth2/code/github

# Gemini (테스트용 더미값)
GOOGLE_GEMINI_API_KEY=test-key
