spring.application.name=codeflow
server.port=8000

# лЎњм»¬ лЇјк°ђ м •ліґлЉ” application-local.propertiesм—ђ мћ‘м„± (gitignoreлђЁ)
# н…њн”Њл¦ї: application-local.properties.example м°ёкі 
spring.config.import=optional:classpath:application-local.properties

# MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:codeflow}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-expiration=3600000

# GitHub OAuth2
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email,read:user
spring.security.oauth2.client.registration.github.redirect-uri=https://test.dong02.com/login/oauth2/code/github

# OAuth2 redirect (лЎњк·ёмќё м„±кіµ н›„ н”„лЎ нЉёлЎњ ліґл‚ј URI)
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:https://web.dong02.com/oauth/callback}
