<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="500" fill="#0B0F1A"/>

  <!-- 장식 Flow Lines 왼쪽 -->
  <g opacity="0.08" transform="translate(80, 250)">
    <path d="M0,0 C40,-60 80,-60 120,0 C160,60 200,60 240,0" fill="none" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
    <path d="M0,30 C40,-30 80,-30 120,30 C160,90 200,90 240,30" fill="none" stroke="#6366F1" stroke-width="5" stroke-linecap="round"/>
    <path d="M0,-30 C40,-90 80,-90 120,-30 C160,30 200,30 240,-30" fill="none" stroke="#06B6D4" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- 장식 Flow Lines 오른쪽 -->
  <g opacity="0.08" transform="translate(1180, 250)">
    <path d="M0,0 C40,-60 80,-60 120,0 C160,60 200,60 240,0" fill="none" stroke="#8B5CF6" stroke-width="6" stroke-linecap="round"/>
    <path d="M0,30 C40,-30 80,-30 120,30 C160,90 200,90 240,30" fill="none" stroke="#6366F1" stroke-width="5" stroke-linecap="round"/>
    <path d="M0,-30 C40,-90 80,-90 120,-30 C160,30 200,30 240,-30" fill="none" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- 작은 장식 점들 -->
  <circle cx="120" cy="100" r="3" fill="#3B82F6" opacity="0.15"/>
  <circle cx="180" cy="380" r="2" fill="#8B5CF6" opacity="0.15"/>
  <circle cx="1320" cy="120" r="3" fill="#06B6D4" opacity="0.15"/>
  <circle cx="1380" cy="400" r="2" fill="#8B5CF6" opacity="0.15"/>
  <circle cx="750" cy="60" r="2" fill="#3B82F6" opacity="0.1"/>
  <circle cx="750" cy="440" r="2" fill="#6366F1" opacity="0.1"/>

  <!-- 메인 아이콘 -->
  <g transform="translate(750, 195)">
    <path d="M-70,0 C-46,-44 -22,-44 2,0 C26,44 50,44 74,0" fill="none" stroke="url(#g1)" stroke-width="6" stroke-linecap="round"/>
    <path d="M-70,22 C-46,-22 -22,-22 2,22 C26,66 50,66 74,22" fill="none" stroke="#6366F1" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
    <path d="M-70,-22 C-46,-66 -22,-66 2,-22 C26,22 50,22 74,-22" fill="none" stroke="#06B6D4" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <polygon points="82,0 70,-9 70,9" fill="#8B5CF6"/>
  </g>

  <!-- 타이틀 -->
  <text x="750" y="310" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="100" font-weight="700" letter-spacing="-3">
    <tspan fill="white">Code</tspan><tspan fill="url(#g1)">Flow</tspan>
  </text>

  <!-- 서브타이틀 -->
  <text x="750" y="365" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#4B5563" letter-spacing="5">VISUAL DEBUGGING FOR LEARNING</text>

  <!-- 구분선 -->
  <line x1="500" y1="395" x2="1000" y2="395" stroke="url(#g1)" stroke-width="1" opacity="0.3"/>

  <!-- 하단 서브텍스트 -->
  <text x="750" y="430" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#374151" letter-spacing="3">WHERE CODE MEETS CLARITY</text>
</svg>
